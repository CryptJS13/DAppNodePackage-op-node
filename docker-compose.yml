version: "3.5"
services:
  op-node:
    build:
      context: op-node
      args:
        UPSTREAM_VERSION: v1.16.0
    volumes:
      - data:/config
    environment:
      - EXTRA_FLAGS
      - CUSTOM_L1_RPC
      - CUSTOM_L1_BEACON_API
      - _DAPPNODE_GLOBAL_OP_EXECUTION_CLIENT
    restart: unless-stopped
    image: op-node.op-node.dnp.dappnode.eth:0.1.2
volumes:
  data: {}